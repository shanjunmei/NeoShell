name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install libssh2
        run: brew install libssh2

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create .app bundle
        run: |
          ARCH=$(echo "${{ matrix.target }}" | cut -d'-' -f1)
          APP_DIR="dist/NeoShell.app"
          mkdir -p "$APP_DIR/Contents/MacOS" "$APP_DIR/Contents/Resources"
          cp "target/${{ matrix.target }}/release/neoshell" "$APP_DIR/Contents/MacOS/"

          cat > "$APP_DIR/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key><string>NeoShell</string>
              <key>CFBundleDisplayName</key><string>NeoShell</string>
              <key>CFBundleIdentifier</key><string>com.neoshell.app</string>
              <key>CFBundleVersion</key><string>${GITHUB_REF_NAME#v}</string>
              <key>CFBundleShortVersionString</key><string>${GITHUB_REF_NAME#v}</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleExecutable</key><string>neoshell</string>
              <key>CFBundleIconFile</key><string>icon</string>
              <key>LSMinimumSystemVersion</key><string>11.0</string>
              <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST

          if [ -f assets/icon.png ]; then
            mkdir -p icon.iconset
            sips -z 16 16 assets/icon.png --out icon.iconset/icon_16x16.png
            sips -z 32 32 assets/icon.png --out icon.iconset/icon_16x16@2x.png
            sips -z 32 32 assets/icon.png --out icon.iconset/icon_32x32.png
            sips -z 64 64 assets/icon.png --out icon.iconset/icon_32x32@2x.png
            sips -z 128 128 assets/icon.png --out icon.iconset/icon_128x128.png
            sips -z 256 256 assets/icon.png --out icon.iconset/icon_128x128@2x.png
            sips -z 256 256 assets/icon.png --out icon.iconset/icon_256x256.png
            sips -z 512 512 assets/icon.png --out icon.iconset/icon_256x256@2x.png
            sips -z 512 512 assets/icon.png --out icon.iconset/icon_512x512.png
            cp icon.iconset/icon_512x512.png icon.iconset/icon_512x512@2x.png
            iconutil -c icns icon.iconset -o "$APP_DIR/Contents/Resources/icon.icns"
            rm -rf icon.iconset
          fi

      - name: Create DMG
        run: |
          ARCH=$(echo "${{ matrix.target }}" | cut -d'-' -f1)
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p dist/dmg
          cp -r dist/NeoShell.app dist/dmg/
          ln -s /Applications dist/dmg/Applications
          hdiutil create -volname "NeoShell" -srcfolder dist/dmg \
            -ov -format UDZO "dist/NeoShell-${VERSION}-macos-${ARCH}.dmg"
          rm -rf dist/dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}
          path: dist/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssh2-1-dev libssl-dev pkg-config \
            libxkbcommon-dev libwayland-dev libvulkan-dev

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create AppImage
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ARCH=x86_64
          APP_DIR="dist/NeoShell.AppDir"
          mkdir -p "$APP_DIR/usr/bin"
          mkdir -p "$APP_DIR/usr/share/applications"
          mkdir -p "$APP_DIR/usr/share/icons/hicolor/256x256/apps"

          cp "target/${{ matrix.target }}/release/neoshell" "$APP_DIR/usr/bin/"
          cp assets/icon.png "$APP_DIR/usr/share/icons/hicolor/256x256/apps/neoshell.png"
          cp assets/icon.png "$APP_DIR/neoshell.png"

          cat > "$APP_DIR/usr/share/applications/neoshell.desktop" << 'DESKTOP'
          [Desktop Entry]
          Name=NeoShell
          Comment=Cross-Platform SSH Manager
          Exec=neoshell
          Icon=neoshell
          Terminal=false
          Type=Application
          Categories=System;TerminalEmulator;Network;
          DESKTOP
          cp "$APP_DIR/usr/share/applications/neoshell.desktop" "$APP_DIR/"

          cat > "$APP_DIR/AppRun" << 'APPRUN'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          exec "${HERE}/usr/bin/neoshell" "$@"
          APPRUN
          chmod +x "$APP_DIR/AppRun"

          # Download appimagetool
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool

          ARCH=x86_64 ./appimagetool "$APP_DIR" "dist/NeoShell-${VERSION}-linux-${ARCH}.AppImage"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.target }}
          path: dist/*.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install vcpkg dependencies
        run: |
          vcpkg install libssh2:x64-windows-static-md openssl:x64-windows-static-md
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      - name: Build release
        env:
          LIBSSH2_SYS_USE_PKG_CONFIG: 0
          VCPKGRS_DYNAMIC: 0
        run: cargo build --release

      - name: Create MSI with WiX
        run: |
          $VERSION = "${{ github.ref_name }}".TrimStart("v")
          mkdir dist

          # Create installer directory
          mkdir installer
          Copy-Item "target\release\neoshell.exe" "installer\"
          Copy-Item "assets\icon.png" "installer\"

          # Create WiX source
          @"
          <?xml version="1.0" encoding="UTF-8"?>
          <Wix xmlns="http://schemas.microsoft.com/wix/2006/wi">
              <Product Id="*" Name="NeoShell" Language="1033" Version="$VERSION.0"
                       Manufacturer="NeoShell" UpgradeCode="a1b2c3d4-e5f6-7890-abcd-ef1234567890">
                  <Package InstallerVersion="200" Compressed="yes" InstallScope="perMachine" />
                  <MajorUpgrade DowngradeErrorMessage="A newer version is already installed." />
                  <MediaTemplate EmbedCab="yes" />
                  <Feature Id="Complete" Title="NeoShell" Level="1">
                      <ComponentGroupRef Id="ProductComponents" />
                  </Feature>
                  <Directory Id="TARGETDIR" Name="SourceDir">
                      <Directory Id="ProgramFiles64Folder">
                          <Directory Id="INSTALLFOLDER" Name="NeoShell" />
                      </Directory>
                  </Directory>
                  <ComponentGroup Id="ProductComponents" Directory="INSTALLFOLDER">
                      <Component Id="MainExecutable" Guid="*" Win64="yes">
                          <File Id="neoshell.exe" Source="installer\neoshell.exe" KeyPath="yes" />
                      </Component>
                  </ComponentGroup>
              </Product>
          </Wix>
          "@ | Out-File -Encoding UTF8 "installer.wxs"

          # Try WiX build, fallback to zip
          try {
            & "${env:WIX}bin\candle.exe" -ext WixUIExtension installer.wxs -o dist\neoshell.wixobj
            & "${env:WIX}bin\light.exe" -ext WixUIExtension dist\neoshell.wixobj -o "dist\NeoShell-$VERSION-windows-x64.msi"
          } catch {
            Compress-Archive -Path "installer\*" -DestinationPath "dist\NeoShell-$VERSION-windows-x64.zip"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: dist/NeoShell-*

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
